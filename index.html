<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sunday Sit Downs</title>
    <meta name="description" content="A private podcast & vodcast for the family — listen and watch, family only." />
    <meta name="theme-color" content="#17181A" />

    <!-- Icons (2026 brand: textured olive tile, Chinese Lantern SS) -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Web app manifest: enables Add to Home Screen (required for push on iOS) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Link preview / share card (Open Graph + Twitter).
         __SITE_URL__ is replaced with the deploy's absolute URL at build time
         by scripts/inject-site-url.mjs (Netlify's $URL). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sunday Sit Downs" />
    <meta property="og:title" content="Sunday Sit Downs" />
    <meta property="og:description" content="A private podcast & vodcast for the family — listen and watch, family only." />
    <meta property="og:url" content="__SITE_URL__/" />
    <meta property="og:image" content="__SITE_URL__/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Sunday Sit Downs with the Slape's — a private podcast for the family" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sunday Sit Downs" />
    <meta name="twitter:description" content="A private podcast & vodcast for the family — listen and watch, family only." />
    <meta name="twitter:image" content="__SITE_URL__/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- id matches the app's runtime font injector so it won't double-load -->
    <link
      id="ssd-fonts"
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700;800;900&display=swap"
    />
    <style>
      /* ─── Brand palette themes (Sunday Sit Downs — MP058) ───────────────────
         Structural tokens flip between light and dark; the two accents
         (Chinese Lantern orange, Cassiopeia mint) stay constant and live in
         the app. Dark is the default. */
      :root, :root[data-theme="dark"] {
        --bg:       #17181A;             /* charcoal black */
        --surface:  #212325;             /* raised charcoal — cards */
        --surface2: #2A2D2F;             /* raised charcoal — insets/tiles */
        --line:     rgba(174,208,201,.14); /* faint Cassiopeia hairline */
        --text:     #F7F7F7;             /* Lynx White */
        --gray:     #8b8f8e;             /* muted neutral text */
        --grayDim:  #c4c8c6;             /* secondary neutral text */
        /* recolor the dark-ink logo art to Lynx White for the charcoal background */
        --logo-filter: brightness(0) saturate(100%) invert(97%);
        /* paper-grain overlay: soft-light lifts the charcoal subtly */
        --grain-blend: soft-light;
        --grain-opacity: .5;
      }
      :root[data-theme="light"] {
        --bg:       #E5EBEA;             /* Dream Catcher */
        --surface:  #F7F7F7;             /* Lynx White */
        --surface2: #dbe6e2;             /* Dream Catcher / Cassiopeia lift */
        --line:     rgba(55,66,49,.18);  /* Sensaimidori hairline */
        --text:     #172713;             /* Deep Slate Olive */
        --gray:     #5f6f5c;             /* muted Sensaimidori */
        --grayDim:  #374231;             /* Sensaimidori — secondary text */
        /* recolor the dark-ink logo art to deep olive for the light background */
        --logo-filter: brightness(0) saturate(100%) invert(11%) sepia(24%) saturate(1400%) hue-rotate(75deg) brightness(92%) contrast(92%);
        /* paper-grain overlay: multiply reads as fibers on the light background */
        --grain-blend: multiply;
        --grain-opacity: .10;
      }
      html, body { margin: 0; background: var(--bg); }
      body { position: relative; min-height: 100vh; }
      /* Paper texture over everything, per-theme blend — gives the flat
         surfaces a printed feel in both light and dark mode. Absolutely
         positioned so it spans the FULL page height (a fixed overlay only
         covers the viewport); tiled at a fixed scale so tall pages don't
         stretch the grain. */
      #grain {
        position: absolute; inset: 0; z-index: 9000; pointer-events: none;
        background: url(/brand/paper-texture.jpg) repeat;
        background-size: 1400px auto;
        mix-blend-mode: var(--grain-blend); opacity: var(--grain-opacity);
      }
    </style>
    <script>
      /* Apply the saved theme before first paint to avoid a flash. */
      (function () {
        try {
          var t = localStorage.getItem("ssd_theme");
          if (t !== "light" && t !== "dark") t = "dark";
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="grain" aria-hidden="true"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
